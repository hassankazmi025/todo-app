<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo-app</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="main-div">
        <h1 class="heading">TODO LIST</h1>
        <div class="todo-div">
          <div class="input-div">
            <input type="text" name="search" id="add-todo" />
          </div>
          <button class="selec-btn">ADD</button>
          <button class="theme-changer">
            <img src="./Vector.svg" alt="" />
          </button>
        </div>
        <div class="list-div">
          <ul class="todo-list">
            <input type="checkbox" name="checkbox" class="checkBox" />
            <li>Note 1 <img src="" alt="" /> <img src="" alt="" /></li>
          </ul>
          <hr class="hr-line" />
          <ul class="todo-list2">
            <input type="checkbox" name="checkbox" class="checkBox" />
            <li>Note #2 <img src="" alt="" /> <img src="" alt="" /></li>
          </ul>
          <hr class="hr-line" />
        </div>
      </div>
    </main>

    <!-- JavaScript intreactive -->
    <script src="./todo.js"></script>
  </body>
</html>
